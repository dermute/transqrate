services:
  transqrate:
    image: ghcr.io/dermute/transqrate:latest
    # build: .                     # uncomment to build from source instead
    container_name: transqrate
    init: true                     # reap ffmpeg children, forward signals
    ports:
      - "8585:8585"
    devices:
      - /dev/dri:/dev/dri          # Intel GPU for QSV hardware encoding
      # Multi-GPU host? Pass the node at its ORIGINAL path (never rename it,
      # libva resolves the name via sysfs) and set the "qsv_device" setting
      # in the UI, e.g.:
      # - /dev/dri/renderD129:/dev/dri/renderD129
    volumes:
      - ./config:/config           # SQLite database, logs, temp files
      # source folders - add them as sources in the web UI using these
      # container paths (e.g. /media/library):
      - /path/to/media:/media/library
      - /path/to/more-media:/media/other
      # optional destination folder: assign it as "output folder" of a
      # source in the UI to keep originals; omit it (and leave the output
      # folder empty in the UI) to transcode in place:
      - /path/to/transcoded:/output
    environment:
      - TZ=Europe/Berlin
    restart: unless-stopped
